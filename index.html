<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Graphic Designer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { 
      height: 100%; 
      background: #000; 
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    video { 
      max-width: 100%; 
      max-height: 100%; 
      width: auto;
      height: auto;
      object-fit: contain; /* Puri video dikhegi, no crop */
    }
  </style>
</head>
<body>
  <video autoplay muted loop playsinline preload="auto">
    <source src="./video/reel.mp4" type="video/mp4">
  </video>
  
  <script>
    // Mobile pe tap karne se play ho jaye agar autoplay block ho
    document.addEventListener('click', () => {
      document.querySelector('video').play();
    });
  </script>
</body>
</html>
