<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Graphic Designer</title>
  <style>
    * { margin: 0; padding: 0; }
    html, body { 
      height: 100%; 
      background: #000; 
      overflow: hidden;
    }
    
    video { 
      width: 100vw; 
      height: 100vh; 
      display: block;
    }
    
    /* Mobile: Fullscreen cover karo */
    @media (max-width: 768px) {
      video {
        object-fit: cover; /* Phone pe zoom karke full screen */
      }
    }
    
    /* Desktop/Laptop: Puri video dikhao, black bars aa jaye to chalega */
    @media (min-width: 769px) {
      video {
        object-fit: contain; /* Laptop pe puri video, no crop */
        background: #000;
      }
    }
  </style>
</head>
<body>
  <video autoplay muted loop playsinline preload="auto">
    <source src="./video/reel.mp4" type="video/mp4">
  </video>
  
  <script>
    document.addEventListener('click', () => {
      document.querySelector('video').play();
    });
  </script>
</body>
</html>
